spring:
  application:
    name: gateway
  main:
    web-application-type: reactive
server:
  port: 8888
eureka:
  client:
    enabled: true
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  tracing:
    sampling:
      probability: 1.0
